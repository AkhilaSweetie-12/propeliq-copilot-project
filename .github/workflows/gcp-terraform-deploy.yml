name: GCP Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      operation:
        description: Terraform operation
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      cloud_run_image:
        description: Optional Cloud Run image override (leave blank to use tfvars value)
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".propel/context/iac/gcp/terraform/**"
      - ".github/workflows/gcp-terraform-deploy.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: gcp-terraform-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'workflow_dispatch' && inputs.operation || 'plan' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    defaults:
      run:
        shell: bash
        working-directory: .propel/context/iac/gcp/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve environment files
        id: envfiles
        run: |
          set -euo pipefail

          ENVIRONMENT="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}"
          TFVARS_FILE="environments/${ENVIRONMENT}/${ENVIRONMENT}.tfvars"
          BACKEND_FILE="environments/${ENVIRONMENT}/backend.hcl"

          if [ ! -f "${TFVARS_FILE}" ]; then
            echo "Missing tfvars file: ${TFVARS_FILE}"
            exit 1
          fi

          if [ ! -f "${BACKEND_FILE}" ]; then
            echo "Missing backend file: ${BACKEND_FILE}"
            exit 1
          fi

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=${TFVARS_FILE}" >> "$GITHUB_OUTPUT"
          echo "backend_file=${BACKEND_FILE}" >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        run: terraform init -input=false -backend-config="${{ steps.envfiles.outputs.backend_file }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          set -euo pipefail

          IMAGE_OVERRIDE="${{ github.event_name == 'workflow_dispatch' && inputs.cloud_run_image || '' }}"
          BASE_ARGS=(
            "-input=false"
            "-var-file=${{ steps.envfiles.outputs.tfvars_file }}"
            "-out=tfplan"
          )

          if [ -n "${IMAGE_OVERRIDE}" ]; then
            terraform plan "${BASE_ARGS[@]}" -var "cloud_run_image=${IMAGE_OVERRIDE}"
          else
            terraform plan "${BASE_ARGS[@]}"
          fi

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.envfiles.outputs.environment }}-${{ github.run_number }}
          path: .propel/context/iac/gcp/terraform/tfplan
          retention-days: 7

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && inputs.operation == 'apply'
        run: terraform apply -input=false tfplan
