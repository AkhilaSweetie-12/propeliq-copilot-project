name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-stack:
    name: Detect Stack
    runs-on: ubuntu-latest
    outputs:
      has_dotnet: ${{ steps.detect.outputs.has_dotnet }}
      has_frontend: ${{ steps.detect.outputs.has_frontend }}
      has_e2e: ${{ steps.detect.outputs.has_e2e }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        shell: bash
        run: |
          if compgen -G "**/*.sln" > /dev/null || compgen -G "**/*.csproj" > /dev/null; then
            echo "has_dotnet=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dotnet=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "client/package.json" ] || [ -f "package.json" ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "e2e/package.json" ]; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
          fi

  api-tests:
    name: API Tests (.NET)
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_dotnet == 'true'
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: Host=localhost;Port=5433;Database=testdb;Username=testuser;Password=testpassword
      REDIS_URL: redis://localhost:6379
      JWT_SIGNING_KEY: ${{ secrets.CI_JWT_SIGNING_KEY }}
      ASPNETCORE_ENVIRONMENT: CI

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore local tools
        run: dotnet tool restore
        continue-on-error: true

      - name: Restore dependencies
        shell: bash
        run: |
          set -euo pipefail
          SLN_FILE=$(find . -maxdepth 3 -name "*.sln" | head -n 1)
          if [ -n "${SLN_FILE}" ]; then
            dotnet restore "${SLN_FILE}"
          else
            dotnet restore
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          SLN_FILE=$(find . -maxdepth 3 -name "*.sln" | head -n 1)
          if [ -n "${SLN_FILE}" ]; then
            dotnet build "${SLN_FILE}" --configuration Release --no-restore
          else
            dotnet build --configuration Release --no-restore
          fi

      - name: Run EF Core migrations (if available)
        shell: bash
        run: |
          set -euo pipefail
          if find . -name "*Api.csproj" | grep -q .; then
            API_PROJECT=$(find . -name "*Api.csproj" | head -n 1)
            dotnet ef database update --project "${API_PROJECT}" || echo "Skipping migrations: ef command failed."
          else
            echo "No Api.csproj found. Skipping migrations."
          fi

      - name: Run tests with JUnit output
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          TEST_PROJECT=$(find . -path "*/api.tests/*.csproj" | head -n 1)
          if [ -n "${TEST_PROJECT}" ]; then
            dotnet test "${TEST_PROJECT}" \
              --configuration Release \
              --no-build \
              --logger "junit;LogFilePath=../test-results/api-tests.xml" \
              --results-directory test-results
          else
            dotnet test --configuration Release --no-build --logger "trx;LogFileName=api-tests.trx"
          fi

      - name: Upload API test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: test-results/

  frontend-tests:
    name: Frontend Tests & Lint (Node)
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_frontend == 'true'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f "client/package.json" ]; then
            cd client && npm ci
          elif [ -f "package.json" ]; then
            npm ci
          fi

      - name: Lint
        shell: bash
        continue-on-error: true
        run: |
          if [ -f "client/package.json" ]; then
            cd client && npm run lint
          elif [ -f "package.json" ]; then
            npm run lint
          fi

      - name: Build
        shell: bash
        run: |
          if [ -f "client/package.json" ]; then
            cd client && npm run build
          elif [ -f "package.json" ]; then
            npm run build
          fi

      - name: Unit tests
        shell: bash
        continue-on-error: true
        run: |
          if [ -f "client/package.json" ]; then
            cd client && npm run test:unit
          elif [ -f "package.json" ]; then
            npm run test:unit
          fi

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_e2e == 'true'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f "e2e/package.json" ]; then
            cd e2e && npm ci
          fi

      - name: Install Playwright browsers
        shell: bash
        run: |
          if [ -f "e2e/package.json" ]; then
            cd e2e && npx playwright install
          fi

      - name: Run Playwright tests
        shell: bash
        continue-on-error: true
        run: |
          if [ -f "e2e/package.json" ]; then
            cd e2e && npm run test:e2e
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [detect-stack, api-tests, frontend-tests, e2e-tests]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## CI Pipeline Summary"
          echo "- Stack Detection: ✓"
          echo "- API Tests: ${{ needs.api-tests.result }}"
          echo "- Frontend Tests: ${{ needs.frontend-tests.result }}"
          echo "- E2E Tests: ${{ needs.e2e-tests.result }}"
