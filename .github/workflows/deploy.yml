name: Deploy to Development

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment (skips tests)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.check.outputs.can-deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment readiness
        id: check
        run: |
          can_deploy=true
          
          # Check if tests passed (unless forced)
          if [ "${{ github.event.inputs.force_deploy }}" != "true" ]; then
            echo "Checking CI status..."
            # This would ideally check the status of the CI workflow
            # For now, we'll assume it passed if we're here
          fi
          
          # Check if required secrets are set
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "ERROR: GCP_PROJECT_ID secret not set"
            can_deploy=false
          fi
          
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "ERROR: GCP_WORKLOAD_IDENTITY_PROVIDER secret not set"
            can_deploy=false
          fi
          
          if [ -z "${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}" ]; then
            echo "ERROR: GCP_TERRAFORM_SERVICE_ACCOUNT secret not set"
            can_deploy=false
          fi
          
          echo "can-deploy=$can_deploy" >> $GITHUB_OUTPUT
          
          if [ "$can_deploy" == "true" ]; then
            echo "SUCCESS: Pre-deployment checks passed"
          else
            echo "ERROR: Pre-deployment checks failed"
          fi

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: |
      github.ref == 'refs/heads/main' || 
      github.event_name == 'workflow_dispatch'
    environment:
      name: development
      url: https://dev-api.propeliq.com
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Frontend to Cloud Run
        run: |
          echo "Deploying frontend to Cloud Run..."
          
          # Create or update Cloud Run service for frontend
          gcloud run deploy propeliq-frontend-dev \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/propeliq-frontend:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --concurrency 80 \
            --max-instances 100 \
            --set-env-vars NODE_ENV=development \
            --quiet || true

      - name: Deploy Backend API to Cloud Run
        run: |
          echo "Deploying backend API to Cloud Run..."
          
          # Create or update Cloud Run service for backend
          gcloud run deploy propeliq-api-dev \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/propeliq-backend:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300 \
            --concurrency 80 \
            --max-instances 10 \
            --set-env-vars ASPNETCORE_ENVIRONMENT=Development \
            --set-env-vars ConnectionString="${{ secrets.DEV_DB_CONNECTION_STRING }}" \
            --quiet || true

      - name: Configure DNS and SSL
        run: |
          echo "Configuring DNS and SSL..."
          # This would configure DNS records and SSL certificates
          # For now, we'll use the default .run.app URLs

      - name: Health check
        run: |
          echo "Performing health checks..."
          
          # Get service URLs
          FRONTEND_URL=$(gcloud run services describe propeliq-frontend-dev --region us-central1 --format='value(status.url)')
          API_URL=$(gcloud run services describe propeliq-api-dev --region us-central1 --format='value(status.url)')
          
          echo "Frontend URL: $FRONTEND_URL"
          echo "API URL: $API_URL"
          
          # Wait for services to be ready
          sleep 30
          
          # Health check frontend
          if curl -f -s "$FRONTEND_URL/health" > /dev/null; then
            echo "SUCCESS: Frontend health check passed"
          else
            echo "ERROR: Frontend health check failed"
            exit 1
          fi
          
          # Health check API
          if curl -f -s "$API_URL/health" > /dev/null; then
            echo "SUCCESS: API health check passed"
          else
            echo "ERROR: API health check failed"
            exit 1
          fi

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-dev.result == 'failure'
    needs: [pre-deploy-checks, deploy-dev]
    environment: development
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Rollback to previous version
        run: |
          echo "Rolling back deployment..."
          
          # Get previous revision
          PREV_REVISION=$(gcloud run services revisions list propeliq-frontend-dev --region us-central1 --limit=2 --sort-by=~createTime --format='value(name)' | tail -n1)
          
          if [ -n "$PREV_REVISION" ]; then
            echo "Rolling back to revision: $PREV_REVISION"
            gcloud run services update-traffic propeliq-frontend-dev --region us-central1 --to-revisions="$PREV_REVISION=100"
            echo "SUCCESS: Rollback completed"
          else
            echo "ERROR: No previous revision found for rollback"
          fi

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-dev, rollback]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Development | ${{ needs.deploy-dev.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rollback | ${{ needs.rollback.result }} |" >> $GITHUB_STEP_SUMMARY
