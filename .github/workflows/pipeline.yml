name: Staged DevOps Pipeline

"on":
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional Docker image tag override
        required: false
        type: string
      registry_provider:
        description: Container registry provider
        required: true
        type: choice
        options:
          - dockerhub
          - gcr
          - artifact-registry
        default: dockerhub
      deploy_apply:
        description: Run deploy apply jobs (true/false)
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      run_destroy_nonprod:
        description: Optional non-prod cleanup (terraform destroy)
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      target_destroy_env:
        description: Non-prod target for optional destroy
        required: true
        type: choice
        options:
          - dev
          - staging
        default: dev
  push:
    branches:
      - main
    paths:
      - ".propel/context/iac/gcp/terraform/**"
      - "src/**"
      - "Dockerfile.*"
      - ".github/workflows/pipeline.yml"

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  TF_ROOT: .propel/context/iac/gcp/terraform
  IMAGE_NAME: propeliq-app
  STATIC_ASSETS_PATH: src/frontend/dist

concurrency:
  group: staged-pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ------------------------------
  # Stage 1: Init Stage
  # ------------------------------
  init_checkout_repository:
    name: Init - Checkout Repository
    runs-on: ubuntu-latest
    outputs:
      commit_sha_short: ${{ steps.sha.outputs.short }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  init_setup_terraform:
    name: Init - Setup Terraform
    runs-on: ubuntu-latest
    needs: init_checkout_repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

  init_terraform_init:
    name: Init - Terraform Init
    runs-on: ubuntu-latest
    needs: init_setup_terraform
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -backend=false -input=false

  init_validate_tf_config:
    name: Init - Validate Terraform Configuration
    runs-on: ubuntu-latest
    needs: init_terraform_init
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate Terraform configuration
        run: terraform validate

  # ------------------------------
  # Stage 2: Docker Build Stage
  # ------------------------------
  docker_build_image:
    name: Docker Build - Build Image
    runs-on: ubuntu-latest
    needs: init_validate_tf_config
    outputs:
      local_image: ${{ steps.meta.outputs.local_image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        run: |
          if [ -n "${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            IMAGE_TAG="${GITHUB_SHA::7}"
          fi
          LOCAL_IMAGE="${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "local_image=${LOCAL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          tags: ${{ steps.meta.outputs.local_image }}

      - name: Export built image as artifact
        run: docker save "${{ steps.meta.outputs.local_image }}" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.run_id }}
          path: image.tar
          retention-days: 1

  docker_tag_image:
    name: Docker Build - Tag Image
    runs-on: ubuntu-latest
    needs: docker_build_image
    outputs:
      image_ref: ${{ steps.tag.outputs.image_ref }}
      registry_host: ${{ steps.tag.outputs.registry_host }}
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ github.run_id }}

      - name: Load built image
        run: docker load -i image.tar

      - name: Resolve and tag image
        id: tag
        run: |
          case "${{ github.event_name == 'workflow_dispatch' && inputs.registry_provider || 'dockerhub' }}" in
            dockerhub)
              REGISTRY_HOST="docker.io"
              TARGET_PREFIX="docker.io/${{ secrets.DOCKERHUB_USERNAME }}"
              ;;
            gcr)
              REGISTRY_HOST="gcr.io"
              TARGET_PREFIX="gcr.io/${{ secrets.GCP_PROJECT_ID }}"
              ;;
            artifact-registry)
              REGISTRY_HOST="${{ secrets.ARTIFACT_REGISTRY_HOST }}"
              TARGET_PREFIX="${{ secrets.ARTIFACT_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}"
              ;;
            *)
              echo "Unsupported registry provider"
              exit 1
              ;;
          esac

          IMAGE_REF="${TARGET_PREFIX}/${{ env.IMAGE_NAME }}:${{ needs.docker_build_image.outputs.image_tag }}"
          docker tag "${{ needs.docker_build_image.outputs.local_image }}" "${IMAGE_REF}"
          docker save "${IMAGE_REF}" -o tagged-image.tar

          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "registry_host=${REGISTRY_HOST}" >> "$GITHUB_OUTPUT"

      - name: Upload tagged image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-tagged-image-${{ github.run_id }}
          path: tagged-image.tar
          retention-days: 1

  docker_registry_login:
    name: Docker Build - Registry Login
    runs-on: ubuntu-latest
    needs: docker_tag_image
    outputs:
      login_verified: ${{ steps.result.outputs.verified }}
    steps:
      - name: Login to Docker Hub
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.registry_provider == 'dockerhub') || github.event_name != 'workflow_dispatch' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.registry_provider == 'gcr' || inputs.registry_provider == 'artifact-registry') }}
        id: gcp_auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Login to GCR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.registry_provider == 'gcr' }}
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: oauth2accesstoken
          password: ${{ steps.gcp_auth.outputs.access_token }}

      - name: Login to Artifact Registry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.registry_provider == 'artifact-registry' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.gcp_auth.outputs.access_token }}

      - name: Mark login as verified
        id: result
        run: echo "verified=true" >> "$GITHUB_OUTPUT"

  docker_push_image:
    name: Docker Build - Push Image
    runs-on: ubuntu-latest
    needs:
      - docker_registry_login
      - docker_tag_image
    steps:
      - name: Download tagged image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-tagged-image-${{ github.run_id }}

      - name: Load tagged image
        run: docker load -i tagged-image.tar

      - name: Login to Docker Hub
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.registry_provider == 'dockerhub') || github.event_name != 'workflow_dispatch' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.registry_provider == 'gcr' || inputs.registry_provider == 'artifact-registry') }}
        id: gcp_auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Login to GCR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.registry_provider == 'gcr' }}
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: oauth2accesstoken
          password: ${{ steps.gcp_auth.outputs.access_token }}

      - name: Login to Artifact Registry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.registry_provider == 'artifact-registry' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.gcp_auth.outputs.access_token }}

      - name: Push Docker image
        run: docker push "${{ needs.docker_tag_image.outputs.image_ref }}"

  # ------------------------------
  # Stage 3: Analyze Code Stage
  # ------------------------------
  analyze_static_code:
    name: Analyze - Static Code Analysis
    runs-on: ubuntu-latest
    needs: docker_push_image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  analyze_security_sast:
    name: Analyze - Security Scan (SAST)
    runs-on: ubuntu-latest
    needs: docker_push_image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  analyze_cloud_governance:
    name: Analyze - Cloud Governance Checks
    runs-on: ubuntu-latest
    needs: docker_push_image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_ROOT }}
          quiet: true

  analyze_iac_tests:
    name: Analyze - IaC Tests (fmt, validate, lint)
    runs-on: ubuntu-latest
    needs: docker_push_image
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: TFLint run
        run: tflint --recursive

  # ------------------------------
  # Stage 4: Deploy Review Stage
  # ------------------------------
  deploy_review_plan:
    name: Deploy Review - Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - analyze_static_code
      - analyze_security_sast
      - analyze_cloud_governance
      - analyze_iac_tests
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Review plan
        run: |
          terraform init -backend=false -input=false
          terraform plan -input=false -var-file=environments/dev/dev.tfvars -out=review.tfplan

      - name: Upload review plan
        uses: actions/upload-artifact@v4
        with:
          name: review-plan-${{ github.run_id }}
          path: ${{ env.TF_ROOT }}/review.tfplan
          retention-days: 3

  deploy_review_manual_approval:
    name: Deploy Review - Manual Approval Gate
    runs-on: ubuntu-latest
    needs: deploy_review_plan
    environment: production
    steps:
      - name: Await approval
        run: echo "Manual approval completed for deploy progression."

  deploy_review_optional_destroy:
    name: Deploy Review - Optional Destroy (Non-Prod)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_destroy_nonprod == 'true' }}
    needs: deploy_review_manual_approval
    environment: ${{ inputs.target_destroy_env }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform destroy (non-prod)
        run: |
          terraform init -backend=false -input=false
          terraform destroy -auto-approve -var-file=environments/${{ inputs.target_destroy_env }}/${{ inputs.target_destroy_env }}.tfvars

  # ------------------------------
  # Stage 5: Plan Static Stage
  # ------------------------------
  plan_dev:
    name: Plan Static - Dev
    runs-on: ubuntu-latest
    needs: deploy_review_manual_approval
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform plan (dev)
        run: |
          terraform init -input=false -backend-config=environments/dev/backend.hcl
          terraform plan -input=false -var-file=environments/dev/dev.tfvars -out=dev.tfplan

      - name: Upload dev plan
        uses: actions/upload-artifact@v4
        with:
          name: plan-dev-${{ github.run_id }}
          path: ${{ env.TF_ROOT }}/dev.tfplan
          retention-days: 3

  plan_staging:
    name: Plan Static - Staging
    runs-on: ubuntu-latest
    needs: deploy_review_manual_approval
    environment: staging
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform plan (staging)
        run: |
          terraform init -input=false -backend-config=environments/staging/backend.hcl
          terraform plan -input=false -var-file=environments/staging/staging.tfvars -out=staging.tfplan

      - name: Upload staging plan
        uses: actions/upload-artifact@v4
        with:
          name: plan-staging-${{ github.run_id }}
          path: ${{ env.TF_ROOT }}/staging.tfplan
          retention-days: 3

  plan_prod:
    name: Plan Static - Production
    runs-on: ubuntu-latest
    needs: deploy_review_manual_approval
    environment: production
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform plan (production)
        run: |
          terraform init -input=false -backend-config=environments/prod/backend.hcl
          terraform plan -input=false -var-file=environments/prod/prod.tfvars -out=prod.tfplan

      - name: Upload prod plan
        uses: actions/upload-artifact@v4
        with:
          name: plan-prod-${{ github.run_id }}
          path: ${{ env.TF_ROOT }}/prod.tfplan
          retention-days: 3

  # ------------------------------
  # Stage 6: Deploy Static Stage
  # ------------------------------
  deploy_dev:
    name: Deploy Static - Dev
    runs-on: ubuntu-latest
    needs: plan_dev
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_apply == 'true' }}
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform apply (dev)
        run: |
          terraform init -input=false -backend-config=environments/dev/backend.hcl
          terraform apply -input=false -auto-approve -var-file=environments/dev/dev.tfvars

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy static assets (dev)
        run: |
          if [ -d "${{ github.workspace }}/${{ env.STATIC_ASSETS_PATH }}" ]; then
            gsutil -m rsync -r "${{ github.workspace }}/${{ env.STATIC_ASSETS_PATH }}" "gs://${{ vars.STATIC_BUCKET }}/"
          else
            echo "Static assets directory not found; skipping."
          fi

      - name: Post-deployment validation (dev)
        run: |
          if [ -n "${{ vars.APP_HEALTHCHECK_URL }}" ]; then
            curl --fail --show-error --location "${{ vars.APP_HEALTHCHECK_URL }}"
          else
            echo "APP_HEALTHCHECK_URL is not defined for dev; skipping validation curl."
          fi

  deploy_staging:
    name: Deploy Static - Staging
    runs-on: ubuntu-latest
    needs: plan_staging
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_apply == 'true' }}
    environment: staging
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform apply (staging)
        run: |
          terraform init -input=false -backend-config=environments/staging/backend.hcl
          terraform apply -input=false -auto-approve -var-file=environments/staging/staging.tfvars

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy static assets (staging)
        run: |
          if [ -d "${{ github.workspace }}/${{ env.STATIC_ASSETS_PATH }}" ]; then
            gsutil -m rsync -r "${{ github.workspace }}/${{ env.STATIC_ASSETS_PATH }}" "gs://${{ vars.STATIC_BUCKET }}/"
          else
            echo "Static assets directory not found; skipping."
          fi

      - name: Post-deployment validation (staging)
        run: |
          if [ -n "${{ vars.APP_HEALTHCHECK_URL }}" ]; then
            curl --fail --show-error --location "${{ vars.APP_HEALTHCHECK_URL }}"
          else
            echo "APP_HEALTHCHECK_URL is not defined for staging; skipping validation curl."
          fi

  deploy_prod:
    name: Deploy Static - Production
    runs-on: ubuntu-latest
    needs: plan_prod
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_apply == 'true' }}
    environment: production
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform apply (production)
        run: |
          terraform init -input=false -backend-config=environments/prod/backend.hcl
          terraform apply -input=false -auto-approve -var-file=environments/prod/prod.tfvars

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy static assets (production)
        run: |
          if [ -d "${{ github.workspace }}/${{ env.STATIC_ASSETS_PATH }}" ]; then
            gsutil -m rsync -r "${{ github.workspace }}/${{ env.STATIC_ASSETS_PATH }}" "gs://${{ vars.STATIC_BUCKET }}/"
          else
            echo "Static assets directory not found; skipping."
          fi

      - name: Post-deployment validation (production)
        run: |
          if [ -n "${{ vars.APP_HEALTHCHECK_URL }}" ]; then
            curl --fail --show-error --location "${{ vars.APP_HEALTHCHECK_URL }}"
          else
            echo "APP_HEALTHCHECK_URL is not defined for production; skipping validation curl."
          fi
