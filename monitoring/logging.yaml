        },
        "database_query": {
          "type": "database_query",
          "query": "SELECT * FROM appointments WHERE user_id = @user_id",
          "execution_time_ms": 45,
          "parameters": ["user_123"],
          "success": true,
          "timestamp": "2024-01-15T10:30:00Z"
        },
        "security_event": {
          "type": "security",
          "event": "authentication_attempt",
          "user_id": "user_123",
          "ip_address": "192.168.1.100",
          "success": true,
          "timestamp": "2024-01-15T10:30:00Z"
        },
        "business_event": {
          "type": "business_event",
          "event": "appointment_booked",
          "appointment_id": "apt_456",
          "user_id": "user_123",
          "provider_id": "prov_789",
          "timestamp": "2024-01-15T10:30:00Z",
          "metadata": {
            "appointment_time": "2024-01-20T14:00:00Z",
            "appointment_type": "general_practice"
          }
        }
      }
    }
