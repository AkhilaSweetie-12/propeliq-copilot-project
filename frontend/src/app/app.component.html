<a class="skip-link" href="#main-content">Skip to main content</a>

<div class="app-shell">
  <header class="app-shell__header">
    <a class="app-shell__brand" routerLink="/dashboard">
      <span class="app-shell__brand-mark">PP</span>
      <span>
        <strong>ProjectPulse</strong>
        <small>Operations cockpit</small>
      </span>
    </a>

    <nav class="app-shell__nav" aria-label="Primary navigation">
      @if (initialized()) {
        @if (isAuthenticated()) {
          <span class="app-shell__identity">
            {{ user()?.firstName }} {{ user()?.lastName }}
          </span>
          <button class="app-shell__link" type="button" (click)="logout()">Log out</button>
        } @else {
          <a class="app-shell__link" routerLink="/login">Log in</a>
          <a class="app-shell__cta" routerLink="/register">Create account</a>
        }
      }
    </nav>
  </header>

  <main id="main-content" class="app-shell__content">
    <router-outlet></router-outlet>
  </main>
</div>
