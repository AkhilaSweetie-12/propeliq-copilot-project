<section class="auth-page surface-card" aria-labelledby="login-title">
  <div class="auth-page__intro">
    <p class="auth-page__eyebrow">Secure access</p>
    <h1 id="login-title">Run the delivery board without losing operational context.</h1>
    <p class="auth-page__copy">
      Sign in to manage projects, move work across the board, and keep deadlines visible.
    </p>
  </div>

  <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label class="auth-form__field">
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="email" />
    </label>

    <label class="auth-form__field">
      <span>Password</span>
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    @if (errorMessage()) {
      <p class="auth-form__error" role="alert">{{ errorMessage() }}</p>
    }

    <button class="auth-form__submit" type="submit" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
    </button>

    <p class="auth-form__footer">
      New to ProjectPulse?
      <a routerLink="/register">Create an account</a>
    </p>
  </form>
</section>
