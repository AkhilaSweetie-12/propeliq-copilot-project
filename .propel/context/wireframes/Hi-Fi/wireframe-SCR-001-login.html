<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCR-001 — Login | PropelIQ Health</title>
<link rel="stylesheet" href="wireframe-shared.css">
<style>
  body { background: var(--neutral-50); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .auth-container { width: 100%; max-width: 440px; padding: var(--space-4); }
  .auth-logo { text-align: center; margin-bottom: var(--space-8); }
  .auth-logo .logo-mark { width: 56px; height: 56px; background: var(--color-teal-500); border-radius: var(--radius-lg); display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 22px; margin-bottom: var(--space-3); }
  .auth-logo h1 { font-size: var(--text-h3); color: var(--color-navy-600); margin: 0; }
  .auth-logo p  { font-size: var(--text-body-sm); color: var(--neutral-400); margin-top: var(--space-1); }
  .auth-card { background: white; border: 1px solid var(--neutral-200); border-radius: var(--radius-xl); padding: var(--space-8); box-shadow: var(--shadow-2); }
  .auth-card h2 { font-size: var(--text-h3); margin-bottom: var(--space-1); }
  .auth-card .sub { font-size: var(--text-body-md); color: var(--neutral-500); margin-bottom: var(--space-6); }
  .form-actions { margin-top: var(--space-6); display: flex; flex-direction: column; gap: var(--space-3); }
  .divider { text-align: center; font-size: var(--text-body-sm); color: var(--neutral-400); margin: var(--space-4) 0; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: calc(50% - 24px); height: 1px; background: var(--neutral-200); }
  .divider::before { left: 0; } .divider::after { right: 0; }
  .forgot-link { text-align: right; font-size: var(--text-body-sm); }
  .register-prompt { text-align: center; font-size: var(--text-body-sm); color: var(--neutral-500); margin-top: var(--space-4); }
  .error-banner { background: var(--color-error-bg); border: 1px solid #FECACA; border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); font-size: var(--text-body-md); color: var(--color-error); margin-bottom: var(--space-4); display: none; }
</style>
</head>
<body>

<!-- Navigation Map
| Element         | Action | Target Screen                         |
|-----------------|--------|---------------------------------------|
| #btn-login      | click  | SCR-004 (Patient Dashboard) / SCR-011 (Staff Dashboard) / SCR-019 (Admin User List) |
| #link-register  | click  | SCR-002 (Registration)                |
-->

<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-mark">P</div>
    <h1>PropelIQ Health</h1>
    <p>Unified Patient Access Platform</p>
  </div>

  <div class="auth-card">
    <h2>Sign in</h2>
    <p class="sub">Enter your credentials to access the platform.</p>

    <!-- Error state (shown on invalid credentials) -->
    <div class="error-banner" id="error-banner" role="alert">
      Incorrect email or password. Please try again.
    </div>

    <form novalidate>
      <div class="form-group">
        <label for="email">Email address <span class="required" aria-hidden="true">*</span></label>
        <input type="email" id="email" name="email" placeholder="e.g. jane.smith@email.com"
               autocomplete="email" aria-required="true">
      </div>

      <div class="form-group">
        <label for="password">Password <span class="required" aria-hidden="true">*</span></label>
        <input type="password" id="password" name="password" placeholder="Enter your password"
               autocomplete="current-password" aria-required="true">
        <div class="forgot-link">
          <a href="#" aria-label="Reset your password">Forgot password?</a>
        </div>
      </div>

      <div class="form-actions">
        <a href="wireframe-SCR-004-patient-dashboard.html" class="btn btn-primary btn-lg w-full" id="btn-login"
           role="button" aria-label="Sign in to your account">
          Sign in
        </a>
      </div>
    </form>

    <div class="register-prompt">
      Don't have an account?&nbsp;
      <a href="wireframe-SCR-002-registration.html" id="link-register">Create account</a>
    </div>
  </div>

  <!-- Wireframe annotation -->
  <div class="wireframe-annotation" style="margin-top: var(--space-4); border-radius: var(--radius-md);">
    <span class="scr-id">SCR-001</span>
    <span>Login</span>
    <span class="priority-badge">P0</span>
    <span class="uxr-tags">UXR: 001, 003, 201, 202, 204, 501, 601</span>
  </div>
</div>

</body>
</html>
