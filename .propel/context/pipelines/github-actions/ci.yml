name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-stack:
    name: Detect Stack
    runs-on: ubuntu-latest
    outputs:
      has_dotnet: ${{ steps.detect.outputs.has_dotnet }}
      has_frontend: ${{ steps.detect.outputs.has_frontend }}
      has_e2e: ${{ steps.detect.outputs.has_e2e }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        shell: bash
        run: |
          if compgen -G "**/*.sln" > /dev/null || compgen -G "**/*.csproj" > /dev/null; then
            echo "has_dotnet=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dotnet=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "client/package.json" ] || [ -f "package.json" ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "e2e/package.json" ]; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
          fi

  api-tests:
    name: API Tests (.NET)
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_dotnet == 'true'
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: Host=localhost;Port=5433;Database=testdb;Username=testuser;Password=testpassword
      REDIS_URL: redis://localhost:6379
      JWT_SIGNING_KEY: ${{ secrets.CI_JWT_SIGNING_KEY }}
      ASPNETCORE_ENVIRONMENT: CI

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore local tools
        run: dotnet tool restore
        continue-on-error: true

      - name: Restore dependencies
        shell: bash
        run: |
          set -euo pipefail
          SLN_FILE=$(find . -maxdepth 3 -name "*.sln" | head -n 1)
          if [ -n "${SLN_FILE}" ]; then
            dotnet restore "${SLN_FILE}"
          else
            dotnet restore
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          SLN_FILE=$(find . -maxdepth 3 -name "*.sln" | head -n 1)
          if [ -n "${SLN_FILE}" ]; then
            dotnet build "${SLN_FILE}" --configuration Release --no-restore
          else
            dotnet build --configuration Release --no-restore
          fi

      - name: Run EF Core migrations (if available)
        shell: bash
        run: |
          set -euo pipefail
          if find . -name "*Api.csproj" | grep -q .; then
            API_PROJECT=$(find . -name "*Api.csproj" | head -n 1)
            dotnet ef database update --project "${API_PROJECT}" || echo "Skipping migrations: ef command failed."
          else
            echo "No Api.csproj found. Skipping migrations."
          fi

      - name: Run tests with JUnit output
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          TEST_PROJECT=$(find . -path "*/api.tests/*.csproj" | head -n 1)
          if [ -n "${TEST_PROJECT}" ]; then
            dotnet test "${TEST_PROJECT}" \
              --configuration Release \
              --no-build \
              --logger "junit;LogFilePath=../test-results/api-tests.xml" \
              --results-directory test-results
          else
            dotnet test --configuration Release --no-build --logger "trx;LogFileName=api-tests.trx"
          fi

      - name: Upload API test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            test-results/**
            **/*.trx
          retention-days: 14

  e2e-tests:
    name: E2E Tests (Playwright Smoke)
    runs-on: ubuntu-latest
    needs:
      - detect-stack
      - api-tests
    if: needs.detect-stack.outputs.has_frontend == 'true' && needs.detect-stack.outputs.has_e2e == 'true'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            e2e/package-lock.json

      - name: Install SPA dependencies
        run: cd client && npm ci

      - name: Install E2E dependencies and browser
        run: cd e2e && npm ci && npx playwright install chromium --with-deps

      - name: Start SPA dev server and wait
        shell: bash
        run: |
          set -euo pipefail
          npm i -g wait-on
          cd client
          npm run dev -- --host 0.0.0.0 --port 3000 > ../spa.log 2>&1 &
          cd ..
          wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright smoke tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          cd e2e
          npx playwright test tests/smoke --reporter=junit,line

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            test-results/**
            e2e/playwright-report/**
            e2e/test-results/**
            spa.log
          retention-days: 14
