name: Deploy Multi-Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: "Artifact or image tag to deploy"
        required: true
        type: string
      dry_run:
        description: "Validate only (no deployment)"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  validate-inputs:
    name: Validate Deployment Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${{ github.event.inputs.image_tag }}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "Invalid image_tag. Allowed: letters, numbers, dot, underscore, hyphen."
            exit 1
          fi

  deploy-dev:
    name: Deploy to Dev
    needs: validate-inputs
    if: github.event.inputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Deploy (Dev)
        shell: bash
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEPLOY_TOKEN: ${{ secrets.DEV_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run for dev environment."
            echo "Would deploy tag '${{ github.event.inputs.image_tag }}' to '${APP_NAME}'."
            exit 0
          fi

          if [ -x "scripts/deploy.sh" ]; then
            ./scripts/deploy.sh dev "${{ github.event.inputs.image_tag }}"
          elif [ -f "scripts/deploy.ps1" ]; then
            pwsh -File scripts/deploy.ps1 -Environment dev -Tag "${{ github.event.inputs.image_tag }}"
          else
            echo "No deploy script found. Add scripts/deploy.sh or scripts/deploy.ps1."
            exit 1
          fi

  deploy-staging:
    name: Deploy to Staging
    needs: validate-inputs
    if: github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy (Staging)
        shell: bash
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run for staging environment."
            echo "Would deploy tag '${{ github.event.inputs.image_tag }}' to '${APP_NAME}'."
            exit 0
          fi

          if [ -x "scripts/deploy.sh" ]; then
            ./scripts/deploy.sh staging "${{ github.event.inputs.image_tag }}"
          elif [ -f "scripts/deploy.ps1" ]; then
            pwsh -File scripts/deploy.ps1 -Environment staging -Tag "${{ github.event.inputs.image_tag }}"
          else
            echo "No deploy script found. Add scripts/deploy.sh or scripts/deploy.ps1."
            exit 1
          fi

  deploy-prod:
    name: Deploy to Prod
    needs: validate-inputs
    if: github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Deploy (Prod)
        shell: bash
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          DEPLOY_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run for prod environment."
            echo "Would deploy tag '${{ github.event.inputs.image_tag }}' to '${APP_NAME}'."
            exit 0
          fi

          if [ -x "scripts/deploy.sh" ]; then
            ./scripts/deploy.sh prod "${{ github.event.inputs.image_tag }}"
          elif [ -f "scripts/deploy.ps1" ]; then
            pwsh -File scripts/deploy.ps1 -Environment prod -Tag "${{ github.event.inputs.image_tag }}"
          else
            echo "No deploy script found. Add scripts/deploy.sh or scripts/deploy.ps1."
            exit 1
          fi
